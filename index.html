function tone(freq,dur,type,gain,bus,detune=0){if(!audio.ctx)return;try{freq=finite(freq,240);dur=Math.max(.01,finite(dur,.05));gain=Math.max(.0001,finite(gain,.04));detune=finite(detune,0);let now=finite(audio.ctx.currentTime,0),o=audio.ctx.createOscillator(),g=audio.ctx.createGain(),f=audio.ctx.createBiquadFilter();o.type=type;o.frequency.setValueAtTime(freq,now);o.detune.value=detune;f.type='lowpass';f.frequency.value=Math.max(400,Math.min(5000,freq*3.4));g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(gain,now+.008);g.gain.exponentialRampToValueAtTime(.0001,now+dur);o.connect(f);f.connect(g);g.connect(bus||audio.ui);o.start(now);o.stop(now+dur+.03)}catch(e){console.warn('Tone unavailable:',e)}}
function soundText(i=0){if(!audio.ctx||finite(settings.text)<=0)return;if(i%3===0){tone(230+(i%5)*32,.032,'triangle',.075,audio.text,(i%2)*4)}}function soundUI(){unlockAudio();tone(330,.055,'sine',.09,audio.ui);tone(660,.04,'triangle',.035,audio.ui)}function soundGood(){unlockAudio();[262,330,392].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.08,audio.ui),i*42))}function soundBad(){unlockAudio();tone(145,.18,'sawtooth',.055,audio.ui);setTimeout(()=>tone(110,.12,'square',.032,audio.ui),40)}
function ensureAmbience(){if(!audio.ctx||audio.ambientNodes.length||finite(settings.ambience)<=0)return;try{let now=finite(audio.ctx.currentTime,0);[55,82.4].forEach((f,i)=>{let o=audio.ctx.createOscillator(),g=audio.ctx.createGain();o.type=i?'sine':'triangle';o.frequency.value=finite(f,55);g.gain.value=.015;o.connect(g);g.connect(audio.amb);o.start(now);audio.ambientNodes.push(o,g)})}catch(e){console.warn('Ambience unavailable:',e)}}
function updateAudio(){if(!audio.master)return;try{audio.master.gain.value=finite(settings.master,.72);audio.text.gain.value=finite(settings.text,.5);audio.ui.gain.value=finite(settings.ui,.65);audio.amb.gain.value=finite(settings.ambience,.16);if(finite(settings.ambience)<=0&&audio.ambientNodes.length){audio.ambientNodes.forEach(n=>{try{n.stop?.()}catch(e){}});audio.ambientNodes=[]}else if(finite(settings.ambience)>0)ensureAmbience()}catch(e){console.warn('Audio update unavailable:',e)}}
function updateShell(){shell.style.setProperty('--fontScale',settings.fontScale);shell.classList.toggle('low',settings.lowHardware);shell.classList.toggle('reduced',settings.reducedMotion);shell.classList.toggle('contrast',settings.highContrast);saveJSON(SETTINGS_KEY,settings);updateAudio();networkEl.textContent=navigator.onLine?'SIGNAL // ONLINE':'SIGNAL // OFFLINE';networkEl.className='signal '+(navigator.onLine?'':'warn')}

function saveCurrent(){if(state.activeSlot<0)return;let slots=loadJSON(SLOT_KEY,[null,null,null,null]);slots[state.activeSlot]={label:`${currentCase().code} // ${currentCase().title}`,when:new Date().toLocaleString(),state};saveJSON(SLOT_KEY,slots)}
function selectSlot(i){let slots=loadJSON(SLOT_KEY,[null,null,null,null]);state=slots[i]?.state?structuredClone(slots[i].state):freshState();state.activeSlot=i;state.screen='cases';saveCurrent();nav('cases');toast(slots[i]?'Save slot restored.':'New file created.');soundGood()}
function nav(screen){clearTyping();state.screen=screen;if(screen==='home')renderHome();else if(screen==='cases')renderCases();else if(screen==='story')renderStory();else if(screen==='board')renderBoard();else if(screen==='archive')renderArchive();else if(screen==='cut')renderCut();else if(screen==='interrogate')renderInterrogate();else if(screen==='settings')renderSettings();else if(screen==='guide')renderGuide();else if(screen==='slots')renderSlots();main.scrollTop=0;updateShell();footerState.textContent=`${currentCase().code} // ${state.screen.toUpperCase()} // SLOT ${state.activeSlot>=0?state.activeSlot+1:'--'}`}
function renderHome(){main.innerHTML=`<div class="hero"><section><div class="kicker">CASEWORK FOR PORTABLE MACHINES // 5 CASES // 25 ENDINGS</div><h1 class="heroTitle">HOUSE<span>OF FLIES</span></h1><div class="quote">“${esc(generatedQuote())}”<small></small></div><p class="small" style="margin:18px 0">An offline-first, low-end-friendly detective archive. The resource loader preloads vector portraits and case data, then the game only renders the material currently on screen.</p><div class="card stack"><div class="sectionTitle">ENTRY PROTOCOL</div><button class="action" data-action="openSlots"><span class="mark">01</span><span><b>OPEN / CREATE CASE FILE</b><small>Four local save slots with separate endings and evidence.</small></span></button><button class="action" data-nav="cases"><span class="mark">02</span><span><b>CASE DIRECTORY</b><small>Five distinct investigations including the final self-case.</small></span></button><button class="action" data-nav="archive"><span class="mark">03</span><span><b>ARCHIVE & GUIDE</b><small>200 volumes, 1,300 on-demand beats per volume, no giant memory cost.</small></span></button><button class="action" data-nav="settings"><span class="mark">04</span><span><b>SETTINGS / SOUND</b><small>Android text scale, low-hardware mode, and separate audio channels.</small></span></button></div></section><aside class="portraitFrame"><img src="${assets['portrait:aster']}" alt="Aster Venn illustrated portrait"><div class="portraitTag">CASEWORK PLATE</div><div class="portraitMeta">ASTER VENN<small>REGISTRY DETECTIVE // ACTIVE FILE UNASSIGNED</small></div></aside></div>`}
function renderSlots(){let slots=loadJSON(SLOT_KEY,[null,null,null,null]);main.innerHTML=`<section class="card"><div class="sectionTitle">LOCAL CASE FILES</div><p class="small">Each slot holds the current scene, all evidence, cut-up progress, archive position, and endings. This browser never uploads your case data.</p><div class="grid4" style="margin-top:14px">${slots.map((s,i)=>`<button class="caseCard" data-action="slot" data-slot="${i}"><span class="caseCode">SLOT // ${i+1}</span><h3>${s?esc(s.label):'EMPTY FILE'}</h3><small>${s?esc(s.when):'Create a local investigation file.'}</small></button>`).join('')}</div><div class="sceneActions"><button data-nav="home">BACK</button><button data-action="clearSlots">ERASE ALL LOCAL SLOTS</button></div></section>`}
function renderCases(){main.innerHTML=`<section class="card"><div class="sectionTitle">CASE DIRECTORY</div><p class="small">Each file uses a different crime mechanism: ration arithmetic, mirror citizenship, a medical choir, a revision train, and the detective\'s own murder.</p><div class="grid3" style="margin-top:14px">${CASES.map(c=>`<button class="caseCard ${state.caseId===c.id?'active':''}" data-action="chooseCase" data-case="${c.id}"><span class="caseCode">${c.code}</span><h3>${esc(c.title)}</h3><small>${esc(c.subtitle)}</small><small style="margin-top:11px;color:var(--amber)">VICTIM // ${esc(c.victim)}</small></button>`).join('')}</div><div class="sceneActions"><button data-nav="home">BACK</button>${state.activeSlot<0?'<button data-action="openSlots">SELECT SAVE SLOT FIRST</button>':''}</div></section>`}
function statPanel(){let s=state.stats;return `<section class="card"><div class="sectionTitle">CASE VITALS</div><div class="stats"><div class="stat"><small>CLARITY</small><b>${s.clarity}</b><div class="meter"><i style="width:${s.clarity}%"></i></div></div><div class="stat"><small>PRESSURE</small><b>${s.pressure}</b><div class="meter pink"><i style="width:${s.pressure}%"></i></div></div><div class="stat"><small>TRUST</small><b>${s.trust}</b><div class="meter acid"><i style="width:${s.trust}%"></i></div></div><div class="stat"><small>TIME</small><b>${s.time}</b><div class="meter amber"><i style="width:${Math.min(100,s.time*12)}%"></i></div></div></div><p class="small" style="margin-bottom:0">Stats alter the accusation outcome. Pressure earns admissions; Trust preserves witnesses; Time creates locks.</p></section>`}
function sceneLine(caseObj,sc,line){return sc.lines[line]||''}
function clearTyping(){typingRun++;clearTimeout(typingTimer);state.typing=false}
function renderStory(){let c=currentCase(),sc=c.scenes[state.scene]||c.scenes[0],line=clamp(state.line,0,sc.lines.length-1);state.line=line;let p=PORTRAITS[sc.portrait]||PORTRAITS.aster;main.innerHTML=`<div class="storyLayout"><section class="storyPanel"><div class="sceneHeader"><h1>${esc(c.title)}<span>${esc(sc.tag)}</span></h1><div class="sceneIndex">SCENE ${state.scene+1}/${c.scenes.length} // LINE ${line+1}/${sc.lines.length}</div></div><div class="dialogue" id="dialogue" role="button" tabindex="0" aria-label="Complete or advance dialogue"><div class="speaker">${esc(sc.speaker)}</div><div class="dialogueText" id="dialogueText"></div></div><div class="dialogueControls"><button class="prevBtn" data-action="prevLine">◀ PREVIOUS LINE</button><button data-action="completeText">COMPLETE TEXT</button><button class="nextBtn" data-action="nextLine">NEXT LINE ▶</button><span class="sceneProgress" id="lineStatus">LINE BUFFER</span></div><div id="storyChoices"></div><div class="sceneActions"><button data-nav="board">EVIDENCE BOARD</button><button data-nav="archive">OPEN ARCHIVE</button><button data-nav="interrogate">INTERROGATE</button><button data-nav="guide">CASE GUIDE</button></div></section><aside class="storySide"><div class="portraitFrame"><img src="${assets['portrait:'+sc.portrait]}" alt="${esc(p.name)} illustrated portrait"><div class="portraitTag">${esc(sc.speaker)}</div><div class="portraitMeta">${esc(p.name)}<small>${esc(p.role)}</small></div></div>${statPanel()}</aside></div>`;startType(sceneLine(c,sc,line));renderStoryChoices()}
function renderStoryChoices(){let c=currentCase(),sc=c.scenes[state.scene]||c.scenes[0],wrap=$('#storyChoices');if(!wrap)return;if(!state.doneLine){wrap.innerHTML='';return}if(state.line<sc.lines.length-1){wrap.innerHTML='<p class="small" style="margin:14px 0 0">Complete the current block, then use <b>NEXT LINE</b>, tap the dialogue surface, or press Space.</p>';return}let choices=sc.choices||[];let base=choices.map((x,i)=>`<button class="choice" data-action="storyChoice" data-key="${esc(x[1])}"><span class="no">0${i+1}</span><span><b>${esc(x[0])}</b><small>File this action and move deeper into the case.</small></span></button>`).join('');let extras=`<div class="sceneActions"><button data-action="advanceScene">MOVE TO NEXT SCENE</button>${state.scene===c.scenes.length-1?'<button data-nav="cut">OPEN CUT-UP ROOM</button><button data-action="accuse">ENTER ACCUSATION</button>':''}</div>`;wrap.innerHTML=`<div class="choiceList">${base}</div>${extras}`}
function startType(text){clearTyping();let target=$('#dialogueText'),status=$('#lineStatus');if(!target)return;state.doneLine=false;state.typing=true;let i=0,run=++typingRun;target.textContent='';status.textContent='RENDERING BLOCK LETTERS...';function tick(){if(run!==typingRun)return;let n=Math.max(1,Math.round(3+(60-settings.textSpeed)/15));let chunk=text.slice(i,i+n);for(const ch of chunk){let span=document.createElement('span');span.className='glyph'+(/[A-Z0-9]/.test(ch)&&i%11===0?' hot':'');span.textContent=ch;target.appendChild(span);i++;if(ch.trim())soundText(i)}if(i<text.length){typingTimer=setTimeout(tick,Math.max(10,settings.textSpeed))}else{state.typing=false;state.doneLine=true;let caret=document.createElement('span');caret.className='caret';target.appendChild(caret);status.textContent='LINE COMPLETE // TAP OR PRESS NEXT';renderStoryChoices()}}tick()}
function completeText(){let c=currentCase(),sc=c.scenes[state.scene];if(!state.typing)return;clearTyping();let target=$('#dialogueText');target.textContent='';sceneLine(c,sc,state.line).split('').forEach((ch,i)=>{let span=document.createElement('span');span.className='glyph'+(/[A-Z0-9]/.test(ch)&&i%11===0?' hot':'');span.textContent=ch;target.appendChild(span)});let caret=document.createElement('span');caret.className='caret';target.appendChild(caret);state.doneLine=true;$('#lineStatus').textContent='LINE COMPLETE // TAP OR PRESS NEXT';renderStoryChoices();soundUI()}
function nextLine(){if(state.screen!=='story')return;if(state.typing){completeText();return}let c=currentCase(),sc=c.scenes[state.scene];if(state.line<sc.lines.length-1){state.line++;saveCurrent();renderStory()}else{renderStoryChoices();toast('Choose an action or move to the next scene.','warn')}}
function prevLine(){if(state.screen!=='story')return;if(state.typing){completeText();return}if(state.line>0){state.line--;saveCurrent();renderStory()}else toast('This is the first line of the scene.','warn')}
function advanceScene(){let c=currentCase();if(state.scene<c.scenes.length-1){state.scene++;state.line=0;state.stats.time++;saveCurrent();nav('story')}else toast('Final scene reached. Open Cut-up or Accusation.','warn')}
function storyChoice(key){let c=currentCase();state.flags[c.id+'_'+key]=true;changeStat('clarity',key.length%2?3:1);changeStat('pressure',key.length%3===0?4:1);changeStat('trust',key.includes('leave')?-3:2);let labels={card:'PUNCHED RATION CARD',clerk:'MINISTRY CLERK STATEMENT',flies:'FLY-LINE OBSERVATION',window:'BROKEN WINDOW MEASURE',oriel:'ORIEL\'S MIRROR ALIBI',lists:'DUPLICATE CENSUS LIST',vent:'VENTILATION RECORDING',cinder:'CHOIR LEADER TESTIMONY',hymnal:'STITCHED HYMNAL',ticket:'IMPOSSIBLE TICKET',timetable:'TIMETABLE PHOTOGRAPH',mira:'NIGHT AUDITOR TESTIMONY',prints:'SELF FINGERPRINTS',report:'FIRST REPORT',original:'ORIGINAL CASE REQUEST'};addEvidence('c'+c.id+'_'+key,labels[key]||('FIELD ACTION // '+key.toUpperCase()),'Filed from a case action.');saveCurrent();toast('Action filed. Keep interrogating or advance the scene.');renderStoryChoices()}
function renderBoard(){let c=currentCase();main.innerHTML=`<section class="grid2"><div class="card"><div class="sectionTitle">EVIDENCE BOARD // ${esc(c.title)}</div><p class="small">Filed evidence stays with this save slot. Archive volumes and cut-up solutions add their own documents.</p><div>${state.evidence.length?state.evidence.map(e=>`<div class="evidenceItem"><b>${esc(e.label)}</b><small>${esc(e.body)}</small></div>`).join(''):'<p class="small">No evidence filed. Explore scenes, interrogations, archives, and cut-up rooms.</p>'}</div></div><div class="card"><div class="sectionTitle">ACCUSATION ROUTER</div><p class="small">Five endings exist per case. Your choice of suspect, proof, clarity, pressure, trust, and time determines the route.</p><label class="small">SUSPECT<br><select id="suspectSelect" style="width:100%;margin-top:7px">${c.suspects.map(s=>`<option>${esc(s)}</option>`).join('')}</select></label><label class="small" style="display:block;margin-top:12px">PRIMARY EVIDENCE<br><select id="evidenceSelect" style="width:100%;margin-top:7px">${state.evidence.length?state.evidence.map(e=>`<option value="${esc(e.id)}">${esc(e.label)}</option>`).join(''):'<option value="">NO EVIDENCE FILED</option>'}</select></label><div class="sceneActions"><button data-action="accuse">SUBMIT ACCUSATION</button><button data-nav="story">RETURN TO CASE</button></div><p class="small">Correct suspect + solved cut-up + high clarity yields the complete route. High pressure can replace truth with a useful confession. Low trust can create a false ending.</p></div></section>`}
function accusation(){let c=currentCase(),sus=$('#suspectSelect')?.value||c.suspects[0];let solved=state.cut[c.id]?.solved;let route=0;if(sus===c.correct&&solved&&state.stats.clarity>=60)route=4;else if(sus===c.correct&&state.stats.pressure>=60)route=3;else if(sus===c.correct&&state.stats.trust<38)route=2;else if(sus===c.correct)route=1;let endingId=`${c.id}-${route}`;let endings=loadJSON(END_KEY,[]);if(!endings.includes(endingId)){endings.push(endingId);saveJSON(END_KEY,endings);state.endingLog=endings}let text=['You submit a name because the city requires one. The report closes cleanly. Something under the signature keeps moving.','You name the correct person, but the mechanism survives. The file is accurate in the way an autopsy is accurate: too late to protect anyone.','The witness breaks before the truth does. The confession is accepted because it is useful, not because it is complete.','Pressure forces a partial admission. The city calls this justice and quietly preserves the machine that made the crime possible.',c.ending][route];main.innerHTML=`<section class="card"><div class="kicker">ENDING ${route+1}/5 // CASE ${c.code}</div><h1 style="font-size:clamp(34px,6vw,78px);margin:0 0 18px;letter-spacing:-.06em">${route===4?'THE ARCHIVE REMEMBERS':'FILE CLOSED?'} </h1><div class="quote">“${esc(text)}”<small>// ending recorded locally // ${endings.length}/25 discovered</small></div><div class="sceneActions" style="margin-top:18px"><button data-action="restartCase">REOPEN THIS CASE</button><button data-nav="cases">CASE DIRECTORY</button><button data-nav="archive">READ ARCHIVE</button></div></section>`;saveCurrent();soundGood()}
function restartCase(){let slot=state.activeSlot;state=freshState();state.activeSlot=slot;state.caseId=currentCase().id;state.screen='story';saveCurrent();nav('story')}
function renderCut(){let c=currentCase(),cut=CUTS[c.id],placed=state.cut[c.id]?.placed||[],solved=state.cut[c.id]?.solved;main.innerHTML=`<section class="card"><div class="sectionTitle">CUT-UP RECONSTRUCTION // ${esc(c.title)}</div><p class="small">The fragments are not in reading order. Select a fragment to place it; the arrangement stays saved. The correct order is different in each case.</p><div class="cutLayout"><div><div class="cutTray">${cut.strips.map((s,i)=>`<button class="strip ${placed.includes(i)?'selected':''}" data-action="placeStrip" data-strip="${i}" ${placed.includes(i)||solved?'disabled':''}><span class="id">[${i+1}]</span><b>${esc(s)}</b></button>`).join('')}</div><div class="sceneActions"><button data-action="clearCut">CLEAR BOARD</button><button data-action="commitCut">TEST RECONSTRUCTION</button><button data-nav="story">BACK TO CASE</button></div></div><aside class="cutBoard"><div class="sectionTitle">ASSEMBLED ORDER</div>${placed.length?placed.map((i,k)=>`<div class="placed"><span style="color:var(--acid)">0${k+1}</span> // ${esc(cut.strips[i])}</div>`).join(''):'<p class="small">No fragments placed yet.</p>'}${solved?'<div class="result">RECONSTRUCTION CONFIRMED. The archive has filed a contradiction against the culprit.</div>':''}</aside></div></section>`}
function placeStrip(i){let c=currentCase(),slot=state.cut[c.id]||{placed:[],solved:false};if(slot.solved||slot.placed.includes(i))return;slot.placed.push(i);state.cut[c.id]=slot;saveCurrent();soundUI();renderCut()}

function commitCut(){let c=currentCase(),cut=CUTS[c.id],slot=state.cut[c.id]||{placed:[]};if(slot.placed.length!==cut.correct.length){toast('Place all five fragments first.','warn');soundBad();return}let good=slot.placed.every((x,i)=>x===cut.correct[i]);if(!good){changeStat('pressure',3);saveCurrent();toast('The sentence collapsed into a false timeline. Rebuild it.','bad');soundBad();return}slot.solved=true;state.cut[c.id]=slot;addEvidence('c'+c.id+'_cut','CUT-UP CONTRADICTION','A reconstructed sentence identifies the concealed order of the crime.');changeStat('clarity',12);saveCurrent();soundGood();renderCut()}
function renderArchive(){let q=state.archive.query||'',base=RESOURCE_CACHE.archiveIndex||Array.from({length:200},(_,i)=>archiveMeta(i+1)),filtered=base.filter(v=>(v.title+' '+v.kind+' '+v.n).toLowerCase().includes(q.toLowerCase()));main.innerHTML=`<section class="card"><div class="sectionTitle">THE FLY ARCHIVE // 200 VOLUMES</div><p class="small">Every volume contains 1,300 on-demand beats. Only the current page is generated, so Android and older DDR3 PCs never need to hold a giant novel library in memory.</p><div class="archiveToolbar"><input id="archiveSearch" value="${esc(q)}" placeholder="Search title, type, or volume number"><button data-action="archiveSearch">SEARCH</button><button data-nav="guide">OPEN GUIDE</button></div><div class="archiveGrid">${filtered.slice(0,48).map(v=>`<button class="volume" data-action="openVolume" data-volume="${v.n}"><small>VOLUME ${String(v.n).padStart(3,'0')} // CASE ${v.caseId+1}</small><b>${esc(v.title)}</b><span>${esc(v.kind)}${v.restricted?' // RESTRICTED':''}</span></button>`).join('')}</div>${filtered.length>48?'<p class="small" style="margin-top:12px">Refine the search to open later volumes.</p>':''}</section>`}
function openVolume(n){state.archive.selected=clamp(+n,1,200);state.archive.beat=clamp(state.archive.beat,1,MAX_BEAT);addEvidence('v'+state.archive.selected,'ARCHIVE VOLUME '+String(state.archive.selected).padStart(3,'0'),'The reader opened this volume and preserved its index.') ;saveCurrent();renderReader()}

function archiveAction(a){if(a==='archiveSearch'){state.archive.query=$('#archiveSearch')?.value||'';renderArchive()}if(a==='nextBeat'){state.archive.beat=clamp(state.archive.beat+3,1,MAX_BEAT);saveCurrent();renderReader()}if(a==='prevBeat'){state.archive.beat=clamp(state.archive.beat-3,1,MAX_BEAT);saveCurrent();renderReader()}if(a==='jumpBeat'){state.archive.beat=clamp(+$('#beatJump')?.value||1,1,MAX_BEAT);saveCurrent();renderReader()}if(a==='nextVolume'){state.archive.selected=clamp(state.archive.selected+1,1,200);state.archive.beat=1;saveCurrent();renderReader()}if(a==='prevVolume'){state.archive.selected=clamp(state.archive.selected-1,1,200);state.archive.beat=1;saveCurrent();renderReader()}}

function vectorData(n){let c=currentCase(),modes=['Ask for a timestamp','Present an impossible detail','Quote an erased sentence','Refuse to speak','Describe the smell of the room','Ask who benefits from the report','Ask what was not counted','Offer a false alibi','Read the victim\'s last line','Ask which version is alive','Request a hand sample','Repeat the door number','Ask what the flies carried','Describe the missing sound','Ask who revised the index'],objects=['a ration stamp','a mirror shard','a hospital chord','a ticket stub','a fingerprint bag','a blank page','a wet fly wing','a duplicate ledger','an unplayed cassette','a civic seal'],contexts=['at the locked service door','under the archive projector','while the clock loses a minute','before the witness sees their file','with the room lights held off','after a false name is entered','while the lift waits between floors','beside the erased station map','when the choir stops breathing','as the city broadcast interrupts'];let v=clamp(+n||0,0,1499),mode=modes[v%15],obj=objects[Math.floor(v/15)%10],context=contexts[Math.floor(v/150)%10],sus=c.suspects[(v*7+Math.floor(v/10))%c.suspects.length];return{no:v+1,sus,prompt:`${mode} ${context}. Place ${obj} between you and ${sus}; record the first noun they refuse to repeat.`,choices:[['Press the contradiction','pressure'],['Protect the witness\'s smaller lie','trust'],['Record the silence as evidence','clarity']]}}

function initAudio(){if(audio.ctx||audio.failed)return;try{let C=window.AudioContext||window.webkitAudioContext;if(!C)return;audio.ctx=new C();audio.master=audio.ctx.createGain();audio.master.gain.value=finite(settings.master,.82);audio.master.connect(audio.ctx.destination);audio.text=audio.ctx.createGain();audio.ui=audio.ctx.createGain();audio.amb=audio.ctx.createGain();audio.text.gain.value=finite(settings.text,.46);audio.ui.gain.value=finite(settings.ui,.72);audio.amb.gain.value=finite(settings.ambience,.10);audio.text.connect(audio.master);audio.ui.connect(audio.master);audio.amb.connect(audio.master)}catch(e){audio.failed=true;audio.ctx=null}}

function ensureAmbience(){if(!audio.ctx||audio.ambientNodes.length||finite(settings.ambience)<=0||settings.lowHardware)return;try{let now=audio.ctx.currentTime;[49,73.42].forEach((f,i)=>{let o=audio.ctx.createOscillator(),g=audio.ctx.createGain(),l=audio.ctx.createOscillator(),lg=audio.ctx.createGain();o.type=i?'sine':'triangle';o.frequency.value=f;g.gain.value=.010;l.frequency.value=.08+i*.03;lg.gain.value=.003;l.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(audio.amb);o.start(now);l.start(now);audio.ambientNodes.push(o,l,g,lg)})}catch(e){}}

<script id="hof-block-typewriter-script">
/* Original cell-by-cell block typewriter. This intentionally replaces the plain span renderer. */
function hofBlockCell(ch,index){
  const cell=document.createElement('span');
  const isSpace=/\s/.test(ch);
  cell.className='blockCell'+(isSpace?' space':'')+((/[A-Z0-9]/.test(ch)&&index%9===0)?' hot':'');
  cell.textContent=isSpace?'':ch;
  cell.setAttribute('aria-hidden','true');
  return cell;
}
function hofBuildBlockLine(target,text){
  target.innerHTML='';
  target.classList.add('blockType');
  target.setAttribute('aria-label',text);
  target.setAttribute('aria-live','polite');
  const label=document.createElement('span');
  label.className='blockTypingLabel';
  label.textContent='';
  label.setAttribute('aria-hidden','true');
  target.appendChild(label);
  const cells=[];
  let word=null;
  const ensureWord=()=>{
    if(!word){word=document.createElement('span');word.className='blockWord';target.appendChild(word)}
    return word;
  };
  let index=0;
  for(const ch of String(text||'')){
    if(ch==='\n'){
      const br=document.createElement('br');
      target.appendChild(br);
      cells.push(null);
      word=null;
      index++;
      continue;
    }
    if(/\s/.test(ch)){
      const cell=hofBlockCell(ch,index++);
      target.appendChild(cell);
      cells.push(cell);
      word=null;
      continue;
    }
    const cell=hofBlockCell(ch,index++);
    ensureWord().appendChild(cell);
    cells.push(cell);
  }
  const caret=document.createElement('i');
  caret.className='blockCaret';
  caret.setAttribute('aria-hidden','true');
  target.appendChild(caret);
  return {cells,caret};
}
function hofMoveBlockCaret(caret,cell,target){
  if(!caret)return;
  if(cell&&cell.parentNode)cell.after(caret);else target.appendChild(caret);
}
function hofFinishBlockLine(text){
  const target=document.getElementById('dialogueText');
  if(!target)return;
  const built=hofBuildBlockLine(target,text);
  let last=null;
  for(const cell of built.cells){
    if(cell){cell.classList.add('revealed');last=cell;}
  }
  hofMoveBlockCaret(built.caret,last,target);
}
function startType(text){
  clearTyping();
  const target=document.getElementById('dialogueText');
  const status=document.getElementById('lineStatus');
  if(!target)return;
  state.doneLine=false;
  state.typing=true;
  const run=++typingRun;
  const built=hofBuildBlockLine(target,text);
  let cursor=0;
  if(status)status.textContent='THE LINE ARRIVES';
  const nextVisible=()=>{
    while(cursor<built.cells.length&&built.cells[cursor]===null)cursor++;
    return cursor<built.cells.length?built.cells[cursor++]:null;
  };
  function tick(){
    if(run!==typingRun)return;
    const burst=Math.max(1,Math.round(1+(55-Number(settings.textSpeed||26))/26));
    let drawn=0;
    for(let n=0;n<burst;n++){
      const cell=nextVisible();
      if(!cell)break;
      cell.classList.add('revealed');
      hofMoveBlockCaret(built.caret,cell,target);
      drawn++;
      if(!cell.classList.contains('space'))soundText(cursor);
    }
    if(cursor<built.cells.length){
      typingTimer=setTimeout(tick,Math.max(11,Number(settings.textSpeed||26)));
    }else{
      state.typing=false;
      state.doneLine=true;
      if(status)status.textContent='THE LINE WAITS';
      renderStoryChoices();
    }
  }
  tick();
}
function completeText(){
  if(!state.typing)return;
  clearTyping();
  const c=currentCase();
  const sc=typeof hofActiveScene==='function'?hofActiveScene():c.scenes[state.scene];
  const text=sceneLine(c,sc,state.line);
  hofFinishBlockLine(text);
  state.typing=false;
  state.doneLine=true;
  const status=document.getElementById('lineStatus');
  if(status)status.textContent='THE LINE WAITS';
  renderStoryChoices();
  try{soundUI()}catch(e){}
}
</script>

<!-- HOUSE OF FLIES // ANDROID FIT OVERRIDES -->
<style id="hof-android-fit">
:root{--hof-vh:1vh;--hof-safe-top:0px;--hof-safe-right:0px;--hof-safe-bottom:0px;--hof-safe-left:0px}
html,body{width:100%;height:100%;min-height:0;overflow:hidden}
body{position:fixed;inset:0;overscroll-behavior:none}
#app{
  width:100%;
  height:calc(var(--hof-vh) * 100);
  min-height:0!important;
  max-height:calc(var(--hof-vh) * 100);
  display:grid;
  place-items:stretch;
  overflow:hidden;
  padding:var(--hof-safe-top) var(--hof-safe-right) var(--hof-safe-bottom) var(--hof-safe-left);
}
#shell{
  width:100%;
  height:100%;
  min-height:0!important;
  max-height:100%;
  min-width:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
#main{
  flex:1 1 0%;
  min-height:0;
  min-width:0;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  touch-action:pan-y;
  scroll-behavior:auto;
  padding-bottom:calc(18px + var(--hof-safe-bottom));
}
#preloader{height:calc(var(--hof-vh) * 100);min-height:0;padding:12px;overflow:hidden}
.loadBox{max-height:calc(var(--hof-vh) * 92);overflow-y:auto;-webkit-overflow-scrolling:touch}
.loadRows{max-height:min(210px,28vh)}

/* Phones: the story pane owns the vertical space; decorative status text never clips it. */
@media (max-width:600px){
  #app{padding:var(--hof-safe-top) var(--hof-safe-right) var(--hof-safe-bottom) var(--hof-safe-left)}
  #shell{border:0;box-shadow:none}
  header{padding:8px 10px;gap:7px;min-width:0}
  .brand{min-width:0;max-width:calc(100% - 84px)}
  .brand strong{font-size:13px;letter-spacing:.085em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand small{display:none}
  .headerRight{min-width:0;margin-left:auto;gap:5px;flex-wrap:nowrap}
  .signal{display:none}
  .topnav{display:none}
  #main{padding:12px 10px calc(16px + var(--hof-safe-bottom))}
  footer{display:none}
  .mobileNav{display:grid;padding:5px 6px calc(6px + var(--hof-safe-bottom));gap:4px;flex:0 0 auto}
  .mobileNav button{min-width:0;min-height:40px;padding:3px 2px;font-size:8px;letter-spacing:0;white-space:nowrap}
  .heroTitle{font-size:clamp(46px,17.2vw,72px);line-height:.76}
  .heroTitle span{font-size:.38em;letter-spacing:.15em}
  .hero{gap:14px}
  .quote{font-size:clamp(17px,5vw,22px);padding:14px 15px}
  .homeLead{font-size:16px}
  .portraitFrame{min-height:clamp(225px,45vh,310px);max-height:46vh}
  .portraitFrame img{object-position:center top}
  .dialogue{min-height:0;padding:13px 11px 52px}
  .dialogueText,.dialogueText.blockType{font-size:calc(15px * var(--fontScale));line-height:1.58}
  .blockCell{width:.70em;height:1.02em;margin:0 .014em}
  .blockWord{margin-bottom:.22em}
  .dialogueControls{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .dialogueControls button{min-width:0;min-height:42px;padding:7px 5px;font-size:9px}
  .dialogueControls .nextBtn{grid-column:span 2}
  .sceneHeader h1{font-size:clamp(26px,9vw,40px)}
  .card{padding:12px}
  .choice{padding:11px 9px}
  .choice b{font-size:11px}
  .choice small{font-size:9px}
  .loadBox{width:100%;padding:18px 14px;box-shadow:6px 6px 0 #050403}
  .loadBox h1{font-size:clamp(38px,14vw,60px);line-height:.8}
  .loadRows{max-height:23vh}
}

/* Very short phones and landscape must not reserve screen height for decoration. */
@media (max-height:540px){
  header{padding:6px 9px}
  .brand strong{font-size:12px}
  .signal{display:none}
  footer{display:none}
  #main{padding:8px 10px 10px}
  .mobileNav{padding:3px 5px calc(4px + var(--hof-safe-bottom))}
  .mobileNav button{min-height:34px;font-size:8px}
  .portraitFrame{min-height:150px;max-height:34vh}
  .dialogue{padding:10px 10px 44px}
  .dialogue:after{right:8px;bottom:8px;font-size:7px}
  .dialogueText,.dialogueText.blockType{font-size:calc(13px * var(--fontScale));line-height:1.48}
  .blockCell{width:.68em;height:.98em;margin:0 .01em}
  .blockWord{margin-bottom:.17em}
  .sceneHeader{margin-bottom:7px}
  .sceneHeader h1{font-size:clamp(22px,6.5vw,34px)}
  .sceneIndex{font-size:8px}
  .card{padding:9px}
  .quote{font-size:16px;padding:11px 12px}
  .homeLead{font-size:14px;margin:11px 0}
  .heroTitle{font-size:46px}
}

/* Tablets and large phones retain the framed PSP look without exceeding the actual viewport. */
@media (min-width:601px){
  #app{padding:clamp(6px,1.6vw,18px)}
  #shell{width:min(1360px,100%);height:100%;max-height:100%}
}

@media (min-width:601px) and (max-width:900px){
  .portraitFrame{min-height:260px;max-height:44vh}
  #main{padding:16px}
}

@supports (padding: env(safe-area-inset-top)){
  :root{
    --hof-safe-top:env(safe-area-inset-top);
    --hof-safe-right:env(safe-area-inset-right);
    --hof-safe-bottom:env(safe-area-inset-bottom);
    --hof-safe-left:env(safe-area-inset-left);
  }
}
</style>
<script id="hof-android-viewport-fit">
(function(){
  function setViewportUnit(){
    var v=window.visualViewport;
    var h=Math.round((v&&v.height)||window.innerHeight||document.documentElement.clientHeight||1);
    document.documentElement.style.setProperty('--hof-vh',(h*.01)+'px');
    document.documentElement.classList.toggle('hof-short-screen',h<540);
  }
  setViewportUnit();
  window.addEventListener('resize',setViewportUnit,{passive:true});
  window.addEventListener('orientationchange',function(){setTimeout(setViewportUnit,80)},{passive:true});
  if(window.visualViewport) window.visualViewport.addEventListener('resize',setViewportUnit,{passive:true});
})();
</script>
